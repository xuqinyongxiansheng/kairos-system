<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸿蒙小雨 - 智能集成系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/theme-chalk/index.css">
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.13/lib/theme-chalk/index.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <el-container class="app-container">
            <el-header class="app-header" height="56px">
                <div class="header-left">
                    <span class="logo-text">鸿蒙小雨</span>
                    <el-tag size="small" type="info" class="version-tag">v2.0.0</el-tag>
                </div>
                <div class="header-center">
                    <span class="model-info" v-if="currentModel">模型: {{ currentModel }}</span>
                </div>
                <div class="header-right">
                    <el-tag v-if="isConnected" size="small" type="success">已连接</el-tag>
                    <el-tag v-else size="small" type="danger">未连接</el-tag>
                    <el-button size="small" icon="el-icon-setting" @click="showSettings = true"></el-button>
                </div>
            </el-header>
            <el-container class="main-container">
                <el-aside width="200px" class="sidebar" v-if="!isMobile">
                    <el-menu
                        :default-active="activeMenuIndex"
                        class="sidebar-menu"
                        @select="handleMenuSelect"
                    >
                        <el-menu-item index="1">
                            <i class="el-icon-chat-dot-round"></i>
                            <span slot="title">智能聊天</span>
                        </el-menu-item>
                        <el-menu-item index="2">
                            <i class="el-icon-microphone"></i>
                            <span slot="title">语音交互</span>
                        </el-menu-item>
                        <el-menu-item index="3">
                            <i class="el-icon-picture"></i>
                            <span slot="title">视觉分析</span>
                        </el-menu-item>
                        <el-menu-item index="4">
                            <i class="el-icon-star-on"></i>
                            <span slot="title">反馈系统</span>
                        </el-menu-item>
                    </el-menu>
                </el-aside>
                <el-main class="content-area">
                    <div v-if="activeTab === 'chat'" class="chat-panel">
                        <div class="chat-header">
                            <span class="chat-title">智能聊天</span>
                            <div class="chat-actions">
                                <el-button size="mini" icon="el-icon-delete" @click="clearChat">清空</el-button>
                            </div>
                        </div>
                        <div class="chat-messages" ref="chatMessages">
                            <div 
                                v-for="(message, index) in chatMessages" 
                                :key="index"
                                :class="['message-bubble', message.role === 'user' ? 'message-user' : 'message-bot']"
                            >
                                <div class="message-avatar">
                                    <span v-if="message.role === 'user'">U</span>
                                    <span v-else>AI</span>
                                </div>
                                <div class="message-body">
                                    <div class="message-content">{{ message.content }}</div>
                                    <div class="message-time">{{ message.timestamp }}</div>
                                </div>
                            </div>
                            <div v-if="isLoading" class="message-bubble message-bot">
                                <div class="message-avatar"><span>AI</span></div>
                                <div class="message-body">
                                    <div class="typing-indicator">
                                        <span></span><span></span><span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="chat-input-area">
                            <el-input
                                v-model="chatInput"
                                placeholder="输入消息，按 Enter 发送..."
                                @keyup.enter.native="sendMessage"
                                :disabled="isLoading"
                                class="chat-input-field"
                            >
                                <el-button 
                                    slot="append" 
                                    icon="el-icon-s-promotion" 
                                    @click="sendMessage"
                                    :loading="isLoading"
                                ></el-button>
                            </el-input>
                        </div>
                    </div>
                    <div v-else-if="activeTab === 'voice'" class="feature-panel">
                        <div class="panel-header"><span>语音交互</span></div>
                        <div class="panel-body">
                            <el-button type="primary" :loading="isRecording" @click="toggleRecording">
                                {{ isRecording ? '停止录制' : '开始录制' }}
                            </el-button>
                            <div class="voice-result" v-if="voiceResult">
                                <h3>识别结果:</h3>
                                <p>{{ voiceResult }}</p>
                                <el-button type="success" @click="sendVoiceMessage">发送到聊天</el-button>
                            </div>
                            <div class="voice-synthesis">
                                <h3>语音合成:</h3>
                                <el-input v-model="synthesisText" placeholder="请输入要合成的文本..." :rows="2" type="textarea"></el-input>
                                <el-button type="info" @click="synthesizeVoice" style="margin-top:10px">合成语音</el-button>
                            </div>
                        </div>
                    </div>
                    <div v-else-if="activeTab === 'vision'" class="feature-panel">
                        <div class="panel-header"><span>视觉分析</span></div>
                        <div class="panel-body">
                            <el-upload class="image-uploader" action="#" :auto-upload="false" :on-change="handleImageUpload" :show-file-list="false">
                                <el-button type="primary">选择图片</el-button>
                            </el-upload>
                            <div class="image-preview" v-if="selectedImage">
                                <img :src="selectedImage" alt="预览图片">
                                <el-button type="success" @click="analyzeImage" style="margin-top:10px">分析图片</el-button>
                            </div>
                            <div class="analysis-result" v-if="analysisResult">
                                <h3>分析结果:</h3>
                                <pre>{{ JSON.stringify(analysisResult, null, 2) }}</pre>
                            </div>
                        </div>
                    </div>
                    <div v-else-if="activeTab === 'feedback'" class="feature-panel">
                        <div class="panel-header"><span>反馈系统</span></div>
                        <div class="panel-body">
                            <el-form :model="feedbackForm" label-width="100px">
                                <el-form-item label="用户ID"><el-input v-model="feedbackForm.user_id"></el-input></el-form-item>
                                <el-form-item label="项目ID"><el-input v-model="feedbackForm.item_id"></el-input></el-form-item>
                                <el-form-item label="反馈类型"><el-input v-model="feedbackForm.feedback_type"></el-input></el-form-item>
                                <el-form-item label="评分"><el-rate v-model="feedbackForm.score" :max="5"></el-rate></el-form-item>
                                <el-form-item label="评论"><el-input v-model="feedbackForm.comment" :rows="3" type="textarea"></el-input></el-form-item>
                                <el-form-item><el-button type="primary" @click="submitFeedback">提交反馈</el-button></el-form-item>
                            </el-form>
                        </div>
                    </div>
                </el-main>
            </el-container>
        </el-container>
        
        <el-dialog title="系统设置" :visible.sync="showSettings" width="500px">
            <el-form :model="settings" label-width="100px">
                <el-form-item label="API地址"><el-input v-model="settings.apiUrl"></el-input></el-form-item>
                <el-form-item label="默认模型">
                    <el-select v-model="settings.defaultModel" placeholder="选择模型">
                        <el-option label="Gemma4 E4B" value="gemma4:e4b"></el-option>
                        <el-option label="Gemma4" value="gemma4:latest"></el-option>
                        <el-option label="Qwen2 0.5B" value="qwen2:0.5b"></el-option>
                        <el-option label="LLaMA 3.2 3B" value="llama3.2:3b"></el-option>
                    </el-select>
                </el-form-item>
            </el-form>
            <span slot="footer" class="dialog-footer">
                <el-button @click="showSettings = false">取消</el-button>
                <el-button type="primary" @click="saveSettings">保存</el-button>
            </span>
        </el-dialog>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/index.js"></script>
    <script>
        if (typeof Vue === 'undefined') {
            var s1 = document.createElement('script');
            s1.src = 'https://unpkg.com/vue@2.6.14/dist/vue.min.js';
            s1.onload = function() {
                var s2 = document.createElement('script');
                s2.src = 'https://unpkg.com/element-ui@2.15.13/lib/index.js';
                s2.onload = function() {
                    var s3 = document.createElement('script');
                    s3.src = '/static/app.js';
                    document.body.appendChild(s3);
                };
                document.head.appendChild(s2);
            };
            document.head.appendChild(s1);
        } else if (typeof ELEMENT === 'undefined') {
            var s2 = document.createElement('script');
            s2.src = 'https://unpkg.com/element-ui@2.15.13/lib/index.js';
            s2.onload = function() {
                var s3 = document.createElement('script');
                s3.src = '/static/app.js';
                document.body.appendChild(s3);
            };
            document.head.appendChild(s2);
        } else {
            var s3 = document.createElement('script');
            s3.src = '/static/app.js';
            document.body.appendChild(s3);
        }
    </script>
</body>
</html>
